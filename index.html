<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Video</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* Tall scroll space — controls how slow/fast video scrubs */
    #scroll-driver {
      height: 600vh;
      position: relative;
    }

    /* Sticky container that fills the viewport */
    #sticky-wrap {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Overlay text that fades in/out based on scroll */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    .headline {
      font-size: clamp(2rem, 8vw, 7rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      text-align: center;
      line-height: 1;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .headline.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .sub {
      margin-top: 1rem;
      font-size: clamp(0.9rem, 2vw, 1.4rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.8s ease 0.3s;
    }

    .sub.visible { opacity: 0.65; }

    /* Progress bar */
    #progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #fff;
      width: 0%;
      z-index: 20;
      transition: width 0.05s linear;
    }

    /* Scroll hint */
    #scroll-hint {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      opacity: 1;
      transition: opacity 0.5s ease;
      z-index: 20;
    }

    #scroll-hint.hidden { opacity: 0; }

    #scroll-hint span {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .arrow {
      width: 20px;
      height: 20px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg);
      animation: bounce 1.4s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50%       { transform: rotate(45deg) translateY(5px); }
    }
  </style>
</head>
<body>

  <div id="scroll-driver">
    <div id="sticky-wrap">
      <video id="vid" src="video.mp4" muted playsinline preload="auto"></video>
    </div>
  </div>

  <div id="overlay">
    <h1 class="headline" id="h1">Feel Every Frame.</h1>
    <p class="sub" id="sub">Scroll to play</p>
  </div>

  <div id="progress-bar"></div>

  <div id="scroll-hint">
    <span>Scroll</span>
    <div class="arrow"></div>
  </div>

  <script>
    const vid = document.getElementById('vid');
    const driver = document.getElementById('scroll-driver');
    const bar = document.getElementById('progress-bar');
    const hint = document.getElementById('scroll-hint');
    const h1 = document.getElementById('h1');
    const sub = document.getElementById('sub');

    // Wait until we know the video duration
    vid.addEventListener('loadedmetadata', init);
    // Fallback if already loaded
    if (vid.readyState >= 1) init();

    function init() {
      // Show headline immediately
      h1.classList.add('visible');
      sub.classList.add('visible');

      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll(); // set initial state
    }

    function onScroll() {
      const scrollTop = window.scrollY;
      const maxScroll = driver.offsetHeight - window.innerHeight;
      const progress = Math.min(Math.max(scrollTop / maxScroll, 0), 1);

      // Scrub video
      const duration = vid.duration || 0;
      if (duration) {
        vid.currentTime = progress * duration;
      }

      // Progress bar
      bar.style.width = (progress * 100) + '%';

      // Hide scroll hint after 5% scroll
      hint.classList.toggle('hidden', progress > 0.05);

      // Fade overlay text:
      // 0–10% → full, 10–20% → fade out, 80–90% → fade back in
      let textOpacity;
      if (progress < 0.10) {
        textOpacity = 1;
      } else if (progress < 0.20) {
        textOpacity = 1 - (progress - 0.10) / 0.10;
      } else if (progress > 0.85) {
        textOpacity = (progress - 0.85) / 0.10;
      } else {
        textOpacity = 0;
      }

      h1.style.opacity = textOpacity;
      sub.style.opacity = textOpacity * 0.65;
    }
  </script>
</body>
</html>
